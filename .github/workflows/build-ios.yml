# SynapseTrade — iOS Build via GitHub Actions
# Compila la app iOS en un runner Mac en la nube (sin necesidad de Mac propia)
#
# REQUISITOS para firmar y distribuir en App Store:
#   1. Apple Developer Account ($99/año)
#   2. Configurar estos Secrets en GitHub > Settings > Secrets:
#      - APPLE_CERTIFICATE_BASE64   (P12 certificate exportado)
#      - APPLE_CERTIFICATE_PASSWORD (password del P12)
#      - APPLE_PROVISIONING_PROFILE_BASE64 (provision profile exportado)
#      - APPLE_TEAM_ID
#
# SIN estos secrets, el workflow compila un build de DEBUG (sin firmar)
# que sirve para verificar que todo compila correctamente.

name: "🍎 Build iOS"

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [main]
  workflow_dispatch: # Permite ejecutar manualmente

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: 🔍 Analyze code
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      # ── Build sin firma (Debug/verificación) ──
      - name: 🏗️ Build iOS (no codesign)
        working-directory: mobile
        run: |
          flutter build ios --debug --no-codesign \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      # ── Build con firma (Release/App Store) — solo si hay secrets ──
      - name: 🔐 Install Apple Certificate
        if: env.HAS_SIGNING == 'true'
        env:
          HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: 📱 Build iOS Release (signed)
        if: env.HAS_SIGNING == 'true'
        env:
          HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        working-directory: mobile
        run: |
          flutter build ipa \
            --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: 📤 Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.run_number }}
          path: |
            mobile/build/ios/iphoneos/Runner.app
            mobile/build/ios/ipa/*.ipa
          retention-days: 14

      - name: ✅ Build Summary
        run: |
          echo "## 🍎 iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Flutter:** 3.41.6" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** ios-build-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY

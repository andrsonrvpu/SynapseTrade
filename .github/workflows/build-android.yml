# SynapseTrade — Android Build via GitHub Actions
# Compila APK + AAB (bundle para Play Store) automáticamente

name: "🤖 Build Android"

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: 🔍 Analyze code
        working-directory: mobile
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 🏗️ Build APK (debug)
        working-directory: mobile
        run: |
          flutter build apk --debug \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: 🏗️ Build APK (release)
        working-directory: mobile
        run: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: 🏗️ Build App Bundle (Play Store)
        working-directory: mobile
        run: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: 📤 Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.run_number }}
          path: mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 14

      - name: ✅ Build Summary
        run: |
          echo "## 🤖 Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **APK Size:** $(du -h mobile/build/app/outputs/flutter-apk/app-release.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Flutter:** 3.41.6" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
